<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#191919"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <rect width="1" height="40" fill="#333" opacity="0.3"/>
    <rect width="40" height="1" fill="#333" opacity="0.3"/>
  </pattern>
  <rect width="800" height="400" fill="url(#grid)"/>
  
  <!-- Gradient orbs -->
  <circle cx="200" cy="200" r="150" fill="#3371ff" opacity="0.15"/>
  <circle cx="600" cy="150" r="100" fill="#1b51f5" opacity="0.1"/>
  <circle cx="400" cy="300" r="80" fill="#5996ff" opacity="0.08"/>
  
  <!-- DOM Logo large -->
  <g transform="translate(320, 140)">
    <rect width="160" height="120" rx="24" fill="#1b51f5"/>
    <path d="M30 35h30a25 25 0 010 50H30V35z" fill="white" opacity="0.9"/>
    <circle cx="115" cy="60" r="18" fill="white" opacity="0.7"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="310" text-anchor="middle" fill="#ebebeb" font-family="system-ui" font-size="28" font-weight="700" letter-spacing="-0.5">Acua Conect</text>
  <text x="400" y="340" text-anchor="middle" fill="#666" font-family="system-ui" font-size="14">Gestión de Tramitaciones Municipales</text>
</svg>
